apiVersion: v1
kind: ConfigMap
metadata:
  name: dishhome-config
  namespace: dishhome
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  DATABASE_URL: "postgresql+asyncpg://dishhome:dishhome_secret@postgres:5432/dishhome_db"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  S3_ENDPOINT_URL: "http://minio:9000"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.1:8b"
  LOG_LEVEL: "INFO"
  ENABLE_PROMETHEUS: "true"
  CORS_ALLOWED_ORIGINS: '["https://portal.dishhome.com.np","https://admin.dishhome.com.np"]'
