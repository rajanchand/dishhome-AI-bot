version: '3.8'

services:
  # DishHome Voice Bot API
  voicebot:
    build: .
    container_name: dishhome-voicebot
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - WHISPER_MODEL_SIZE=base
      - WHISPER_DEVICE=cpu
      - APP_ENV=production
      - APP_DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/dishhome_voicebot.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - dishhome-network

  # Ollama LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: dishhome-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - dishhome-network
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:

networks:
  dishhome-network:
    driver: bridge
