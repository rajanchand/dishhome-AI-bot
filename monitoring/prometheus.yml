global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dishhome
    environment: production

scrape_configs:
  - job_name: voicebot
    metrics_path: /metrics
    static_configs:
      - targets: ["voicebot:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules.yml
